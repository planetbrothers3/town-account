<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>町内会 会計入力</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; padding: 12px; }
    h1 { font-size: 20px; }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input, select, textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      font-size: 16px;
    }
    button {
      margin-top: 16px;
      padding: 10px;
      width: 100%;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>町内会 会計入力フォーム</h1>

  <form id="accountForm">
    <!-- 日付 -->
    <div>
      <label for="date">日付</label><br>
      <small>支払いや入金があった日を入力してください。</small><br>
      <input type="date" id="date" name="date" required>
    </div>

    <br>

    <!-- 区分 -->
    <div>
      <label for="type">区分</label><br>
      <small>お金が入ったときは「収入」、出たときは「支出」を選びます。</small><br>
      <select id="type" name="type" required>
        <option value="">選択してください</option>
        <option value="収入">収入</option>
        <option value="支出">支出</option>
      </select>
    </div>

    <br>

    <!-- 科目 -->
    <div>
      <label for="category">科目</label><br>
      <small>区分を選ぶと、この取引に一番近い科目を選べます。</small><br>
      <select id="category" name="category" required>
        <option value="">区分を先に選んでください</option>
      </select>
    </div>

    <br>

    <!-- 金額 -->
    <div>
      <label for="amount">金額</label><br>
      <small>円単位で、カンマなしで入力してください。（例：3000）</small><br>
      <input type="number" id="amount" name="amount" required>
    </div>

    <br>

    <!-- 内容（メモ） -->
    <div>
      <label for="memo">内容</label><br>
      <small>誰への支払いか、何の入金かなどを簡単に書いてください。</small><br>
      <textarea id="memo" name="memo" rows="3"></textarea>
    </div>

    <br>

    <!-- 送信ボタン -->
    <button type="submit">登録</button>
  </form>

  <script>
   // 区分ごとの科目リスト（従来の報告書に合わせたもの）
    const categories = {
      '収入': [
        '自治会費',
        '自治組織助成金',
        '地域活動費',
        '集団回収事業補助金',
        '集団回収売上げ',
        '電柱等敷地利用料',
        '受取利息',
        '雑収入'
      ],
      '支出': [
        '固定資産税',
        '災対連分担金',
        '慶弔費',
        '事務用品費',
        '交通費',
        '通信費',
        '団地案内板更新費',
        '公園等樹木剪定費',
        '雑費'
      ]
    };


    // フォーム要素の取得（HTMLの読み込み後）
    window.addEventListener('DOMContentLoaded', () => {
      const typeSelect = document.getElementById('type');
      const categorySelect = document.getElementById('category');
      const form = document.getElementById('accountForm');

      // ★ここにあなたのApps ScriptのWebアプリURLを入れる
      const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxxju1pUykfbjCPF5hH6yXs-pogDj5TeaU_UIavs7Nt04f1dBipwNefSPPaIuDYKgNi/exec';

      // 区分が変わったときに科目を切り替え
      typeSelect.addEventListener('change', () => {
        const t = typeSelect.value;
        categorySelect.innerHTML = '<option value="">選択してください</option>';
        if (!categories[t]) return;
        categories[t].forEach(name => {
          const opt = document.createElement('option');
          opt.value = name;
          opt.textContent = name;
          categorySelect.appendChild(opt);
        });
      });

      // フォーム送信時にスプレッドシートへ送る
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const data = {
          date: document.getElementById('date').value,
          type: document.getElementById('type').value,
          category: document.getElementById('category').value,
          amount: document.getElementById('amount').value,
          memo: document.getElementById('memo').value
        };

        fetch(SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(data)
        }).then(() => {
          alert('スプレッドシートに送信しました。');
          form.reset();
          categorySelect.innerHTML = '<option value="">区分を先に選んでください</option>';
        }).catch((error) => {
          alert('送信に失敗しました。後でもう一度お試しください。');
          console.error(error);
        });
      });
    });
  </script>
</body>
</html>
